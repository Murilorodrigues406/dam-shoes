# ═══════════════════════════════════════════════════
# DAM Shoes — Configuração Netlify
# Headers de segurança aplicados a todas as páginas
# ═══════════════════════════════════════════════════

[[headers]]
  for = "/*"
  [headers.values]
    # Impede que o site seja carregado dentro de iframes de outros domínios (anti-clickjacking)
    X-Frame-Options = "SAMEORIGIN"
    # Impede o navegador de "adivinhar" o tipo de arquivo (anti-MIME-sniffing)
    X-Content-Type-Options = "nosniff"
    # Controla quais informações de referência são enviadas
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restringe acesso a recursos sensíveis do navegador
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Força HTTPS por 1 ano
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
